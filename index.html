<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 A Little Question For You...</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #ffe6f0 0%, #fff0f5 40%, #ffe8f2 100%);
    font-family: 'Nunito', sans-serif;
    overflow-x: hidden;
  }

  .floating-hearts {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .heart-particle {
    position: absolute;
    font-size: 20px;
    animation: floatUp linear infinite;
    opacity: 0;
  }

  @keyframes floatUp {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.7; }
    90% { opacity: 0.4; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* PAGE 1 */
  #page1 {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .panda-container {
    margin-bottom: 1.5rem;
    animation: bounce 2s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .panda-art {
    font-size: 90px;
    line-height: 1;
    filter: drop-shadow(0 4px 12px rgba(255, 100, 150, 0.25));
  }

  .question-text {
    font-family: 'Dancing Script', cursive;
    font-size: 2.8rem;
    color: #c0395a;
    margin-bottom: 2.5rem;
    text-shadow: 1px 2px 8px rgba(192,57,90,0.15);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }

  .buttons-container {
    display: flex;
    gap: 1.5rem;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  #yesBtn {
    background: linear-gradient(135deg, #ff6b9d, #ff3d6e);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 18px rgba(255,61,110,0.4);
    min-width: 120px;
  }

  #yesBtn:hover {
    transform: scale(1.07);
    box-shadow: 0 6px 24px rgba(255,61,110,0.5);
  }

  #noBtn {
    background: white;
    color: #c0395a;
    border: 2px solid #f0a0b8;
    border-radius: 50px;
    padding: 14px 36px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.2rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    min-width: 120px;
    position: relative;
  }

  #noBtn:hover {
    background: #fff0f4;
  }

  .no-shake {
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px) rotate(-2deg); }
    75% { transform: translateX(8px) rotate(2deg); }
  }

  /* PAGE 2 */
  #page2 {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 0;
    position: relative;
    z-index: 1;
    text-align: center;
    background: linear-gradient(180deg, #1a0a14 0%, #3d1030 40%, #6b1e4a 70%, #a83265 100%);
    overflow: hidden;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .p2-stars {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }

  .panda-scene {
    position: relative;
    z-index: 2;
    margin-top: 3rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .panda-svg-wrap {
    position: relative;
    width: 260px;
    height: 180px;
    margin: 0 auto;
  }

  .rising-heart {
    position: absolute;
    font-size: 1.4rem;
    animation: riseHeart linear infinite;
    pointer-events: none;
  }

  @keyframes riseHeart {
    0% { opacity: 0; transform: translateY(0) scale(0.5); }
    15% { opacity: 1; }
    80% { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-130px) scale(1.2) rotate(15deg); }
  }

  .knew-it-text {
    font-family: 'Dancing Script', cursive;
    font-size: 3rem;
    color: #ffb3d1;
    margin-top: 1.2rem;
    text-shadow: 0 0 30px rgba(255,100,160,0.6), 0 2px 8px rgba(0,0,0,0.4);
    animation: glowPulse 2s ease-in-out infinite;
    position: relative;
    z-index: 2;
  }

  @keyframes glowPulse {
    0%, 100% { text-shadow: 0 0 20px rgba(255,100,160,0.5), 0 2px 8px rgba(0,0,0,0.4); }
    50% { text-shadow: 0 0 40px rgba(255,100,160,0.9), 0 2px 8px rgba(0,0,0,0.4); }
  }

  .quote-card {
    position: relative;
    z-index: 2;
    margin: 1.8rem auto 2rem;
    max-width: 520px;
    width: calc(100% - 3rem);
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,180,210,0.25);
    border-radius: 24px;
    padding: 2rem 2rem 1.8rem;
    backdrop-filter: blur(8px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
    animation: cardReveal 1s ease 0.4s both;
  }

  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .quote-mark {
    font-family: 'Dancing Script', cursive;
    font-size: 5rem;
    color: #ff6b9d;
    line-height: 0.5;
    display: block;
    margin-bottom: 0.8rem;
    opacity: 0.7;
  }

  .quote-lines {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .quote-line {
    font-family: 'Dancing Script', cursive;
    font-size: 1.25rem;
    color: #ffd6e8;
    line-height: 1.9;
    opacity: 0;
    transform: translateY(12px);
    animation: lineReveal 0.5s ease forwards;
  }

  .quote-line span.accent {
    color: #ff8fab;
    font-size: 1.35rem;
  }

  .quote-line:last-child {
    font-size: 1.5rem;
    color: #ffb3d1;
    font-weight: 700;
    margin-top: 0.5rem;
  }

  @keyframes lineReveal {
    to { opacity: 1; transform: translateY(0); }
  }

  .bottom-hearts {
    position: relative;
    z-index: 2;
    font-size: 1.8rem;
    letter-spacing: 0.4rem;
    margin-bottom: 2.5rem;
    animation: floatBob 2s ease-in-out infinite;
  }

  @keyframes floatBob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .p2-glow-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
    z-index: 0;
  }

  .confetti-wrapper {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }

  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="floating-hearts" id="floatingHearts"></div>

<!-- PAGE 1 -->
<div id="page1">
  <div class="panda-container">
    <div class="panda-art">🐼💋🐼</div>
  </div>

  <div class="question-text" id="questionText">Hey my Love, do you love me?</div>

  <div class="buttons-container">
    <button id="yesBtn" onclick="goToPage2()">Yes 💕</button>
    <button id="noBtn" onclick="clickNo()">No</button>
  </div>
</div>

<!-- PAGE 2 -->
<div id="page2">
  <div class="p2-stars" id="p2Stars"></div>
  <div class="p2-glow-orb" style="width:400px;height:400px;background:rgba(255,80,140,0.18);top:-100px;left:-100px;"></div>
  <div class="p2-glow-orb" style="width:300px;height:300px;background:rgba(180,40,120,0.18);bottom:0;right:-60px;"></div>

  <div class="panda-scene">
    <div class="panda-svg-wrap" id="pandaWrap">
      <!-- Animated pandas via SVG -->
      <svg width="260" height="170" viewBox="0 0 260 170" xmlns="http://www.w3.org/2000/svg">
        <!-- Left panda body -->
        <ellipse cx="78" cy="130" rx="38" ry="32" fill="#f5f5f5"/>
        <ellipse cx="78" cy="130" rx="38" ry="32" fill="white" stroke="#ddd" stroke-width="1"/>
        <!-- Left panda head -->
        <circle cx="78" cy="88" r="30" fill="white" stroke="#eee" stroke-width="1"/>
        <!-- Left panda ears -->
        <circle cx="55" cy="65" r="12" fill="#2a2a2a"/>
        <circle cx="101" cy="65" r="12" fill="#2a2a2a"/>
        <!-- Left eye patches -->
        <ellipse cx="68" cy="83" rx="9" ry="8" fill="#2a2a2a"/>
        <ellipse cx="88" cy="83" rx="9" ry="8" fill="#2a2a2a"/>
        <!-- Left eyes -->
        <circle cx="68" cy="83" r="4" fill="white"/>
        <circle cx="88" cy="83" r="4" fill="white"/>
        <circle cx="69" cy="83" r="2" fill="#111"/>
        <circle cx="89" cy="83" r="2" fill="#111"/>
        <!-- Left shine -->
        <circle cx="70" cy="81" r="1" fill="white"/>
        <circle cx="90" cy="81" r="1" fill="white"/>
        <!-- Left nose -->
        <ellipse cx="78" cy="92" rx="5" ry="3.5" fill="#2a2a2a"/>
        <!-- Blush -->
        <ellipse cx="62" cy="94" rx="7" ry="4" fill="#ffb3c8" opacity="0.6"/>
        <ellipse cx="94" cy="94" rx="7" ry="4" fill="#ffb3c8" opacity="0.6"/>
        <!-- Left arm reaching right -->
        <ellipse cx="108" cy="120" rx="14" ry="10" fill="#2a2a2a" transform="rotate(-20 108 120)"/>

        <!-- Right panda body -->
        <ellipse cx="182" cy="130" rx="38" ry="32" fill="white" stroke="#eee" stroke-width="1"/>
        <!-- Right panda head -->
        <circle cx="182" cy="88" r="30" fill="white" stroke="#eee" stroke-width="1"/>
        <!-- Right panda ears -->
        <circle cx="159" cy="65" r="12" fill="#2a2a2a"/>
        <circle cx="205" cy="65" r="12" fill="#2a2a2a"/>
        <!-- Right eye patches -->
        <ellipse cx="172" cy="83" rx="9" ry="8" fill="#2a2a2a"/>
        <ellipse cx="192" cy="83" rx="9" ry="8" fill="#2a2a2a"/>
        <!-- Right eyes -->
        <circle cx="172" cy="83" r="4" fill="white"/>
        <circle cx="192" cy="83" r="4" fill="white"/>
        <circle cx="173" cy="83" r="2" fill="#111"/>
        <circle cx="193" cy="83" r="2" fill="#111"/>
        <!-- Right shine -->
        <circle cx="174" cy="81" r="1" fill="white"/>
        <circle cx="194" cy="81" r="1" fill="white"/>
        <!-- Right nose -->
        <ellipse cx="182" cy="92" rx="5" ry="3.5" fill="#2a2a2a"/>
        <!-- Right blush -->
        <ellipse cx="166" cy="94" rx="7" ry="4" fill="#ffb3c8" opacity="0.6"/>
        <ellipse cx="198" cy="94" rx="7" ry="4" fill="#ffb3c8" opacity="0.6"/>
        <!-- Right arm reaching left -->
        <ellipse cx="152" cy="120" rx="14" ry="10" fill="#2a2a2a" transform="rotate(20 152 120)"/>

        <!-- Kiss mark in the middle -->
        <text x="125" y="76" font-size="22" text-anchor="middle">💋</text>
      </svg>

      <!-- Rising hearts container -->
      <div id="risingHeartsContainer" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></div>
    </div>
  </div>

  <div class="knew-it-text">I knew it! 🥰</div>

  <div class="quote-card">
   
    <ul class="quote-lines" id="quoteLines">
      <li class="quote-line">To my love, my <span class="accent">soulmate.</span></li>
      <li class="quote-line">My helping hand, my best <span class="accent">friend.</span></li>
      <li class="quote-line">My happy place, my best <span class="accent">memories.</span></li>
      <li class="quote-line">My today, tomorrow and <span class="accent">forever.</span></li>
      <li class="quote-line">My laughter and <span class="accent">support.</span></li>
      <li class="quote-line">My whole <span class="accent">world.</span></li>
      <li class="quote-line">My <span class="accent">Husband. 💍</span></li>
    </ul>
  </div>

  <div class="bottom-hearts">💕 💖 💗 💓 💞</div>
</div>

<div class="confetti-wrapper" id="confettiWrapper"></div>

<script>
  const noMessages = [
    "Are you sure?",
    "Really sure?",
    "Think again...",
    "Last chance!",
    "Surely not?",
    "You might regret this...",
    "Give it another thought!",
    "Are you absolutely certain?",
    "This could be a mistake...",
    "Have a heart! 🥺",
    "Change of heart?",
    "Wouldn't you consider...?",
    "Is that your final answer?",
    "You're breaking my heart... 💔",
    "Do you really not love me?"
  ];

  let noCount = 0;
  let yesFontSize = 1.2;
  const maxNoIndex = noMessages.length - 1;

  function createFloatingHearts() {
    const container = document.getElementById('floatingHearts');
    const hearts = ['💗','💕','💓','🌸','✨','💖'];
    for (let i = 0; i < 18; i++) {
      const h = document.createElement('span');
      h.className = 'heart-particle';
      h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      h.style.left = Math.random() * 100 + '%';
      h.style.fontSize = (14 + Math.random() * 16) + 'px';
      h.style.animationDuration = (7 + Math.random() * 10) + 's';
      h.style.animationDelay = (Math.random() * 10) + 's';
      container.appendChild(h);
    }
  }

  function clickNo() {
    if (noCount >= maxNoIndex) return;

    const noBtn = document.getElementById('noBtn');
    const questionText = document.getElementById('questionText');
    const yesBtn = document.getElementById('yesBtn');

    noCount++;
    noBtn.textContent = noMessages[noCount - 1];

    noBtn.classList.remove('no-shake');
    void noBtn.offsetWidth;
    noBtn.classList.add('no-shake');

    yesFontSize += 0.18;
    yesBtn.style.fontSize = yesFontSize + 'rem';
    yesBtn.style.padding = (14 + noCount * 2.5) + 'px ' + (36 + noCount * 4) + 'px';

    if (noCount === maxNoIndex) {
      noBtn.textContent = noMessages[maxNoIndex - 1];
      makeFinalNoEvasive();
    }
  }

  function makeFinalNoEvasive() {
    const noBtn = document.getElementById('noBtn');
    noBtn.textContent = "Do you really not love me?";
    noBtn.style.position = 'absolute';

    noBtn.addEventListener('mouseenter', evadeButton);
    noBtn.addEventListener('touchstart', evadeButton);
  }

  function evadeButton(e) {
    const noBtn = document.getElementById('noBtn');
    const padding = 80;
    const maxX = window.innerWidth - noBtn.offsetWidth - padding;
    const maxY = window.innerHeight - noBtn.offsetHeight - padding;

    const newX = padding + Math.random() * maxX;
    const newY = padding + Math.random() * maxY;

    noBtn.style.left = newX + 'px';
    noBtn.style.top = newY + 'px';
  }

  function goToPage2() {
    document.getElementById('page1').style.display = 'none';
    const page2 = document.getElementById('page2');
    page2.style.display = 'flex';
    launchConfetti();
    createExtraHearts();
    buildStars();
    startRisingHearts();
    animateQuoteLines();
  }

  function buildStars() {
    const container = document.getElementById('p2Stars');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = 1 + Math.random() * 3;
      s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s;`;
      container.appendChild(s);
    }
  }

  function startRisingHearts() {
    const container = document.getElementById('risingHeartsContainer');
    const hearts = ['💗','💕','💖','💓','💞','❤️','🩷'];
    setInterval(() => {
      const h = document.createElement('span');
      h.className = 'rising-heart';
      h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      h.style.left = (60 + Math.random() * 140) + 'px';
      h.style.top = '80px';
      h.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
      h.style.animationDelay = '0s';
      h.style.fontSize = (1 + Math.random() * 0.8) + 'rem';
      container.appendChild(h);
      setTimeout(() => h.remove(), 3200);
    }, 320);
  }

  function animateQuoteLines() {
    const lines = document.querySelectorAll('.quote-line');
    lines.forEach((line, i) => {
      line.style.animationDelay = (0.6 + i * 0.25) + 's';
    });
  }

  function launchConfetti() {
    const wrapper = document.getElementById('confettiWrapper');
    const colors = ['#ff6b9d','#ff3d6e','#ffb3c8','#ff8fab','#ffd6e0','#ffc2d4','#ffafc5'];
    for (let i = 0; i < 120; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.top = '-20px';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.width = (6 + Math.random() * 10) + 'px';
      c.style.height = (6 + Math.random() * 10) + 'px';
      c.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
      c.style.animationDelay = (Math.random() * 1.5) + 's';
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      wrapper.appendChild(c);
    }
    setTimeout(() => wrapper.innerHTML = '', 5000);
  }

  function createExtraHearts() {
    const container = document.getElementById('floatingHearts');
    const hearts = ['💖','💗','💕','💓','💞','🌸','✨'];
    for (let i = 0; i < 15; i++) {
      const h = document.createElement('span');
      h.className = 'heart-particle';
      h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      h.style.left = Math.random() * 100 + '%';
      h.style.fontSize = (18 + Math.random() * 20) + 'px';
      h.style.animationDuration = (4 + Math.random() * 6) + 's';
      h.style.animationDelay = '0s';
      container.appendChild(h);
    }
  }

  createFloatingHearts();
</script>
</body>
</html>
